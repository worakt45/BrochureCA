<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้างโบรชัวร์ขายบ้าน (Brochure Builder)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; margin-top: -6px; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e5e7eb; border-radius: 2px; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* Print Mode */
        @media print {
            @page { size: A3 portrait; margin: 0mm !important; }
            html, body { 
                margin: 0 !important; padding: 0 !important; 
                width: 100%; height: 100vh !important; 
                overflow: hidden !important; background: white; 
                -webkit-print-color-adjust: exact; print-color-adjust: exact; 
            }
            .no-print { display: none !important; }
            ::-webkit-scrollbar { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const IconBase = ({ size = 24, className = "", children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const Gift = (props) => <IconBase {...props}><polyline points="20 12 20 22 4 22 4 12"/><rect width="20" height="5" x="2" y="7"/><line x1="12" x2="12" y1="22" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></IconBase>;
        const Phone = (props) => <IconBase {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Printer = (props) => <IconBase {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></IconBase>;
        const ImageIcon = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></IconBase>;
        const Settings = (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;

        const ImageControl = ({ label, imageKey, imageData, onUpload, onUpdateSetting }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border border-gray-200 rounded-lg p-3 bg-white">
                    <div className="flex justify-between items-center mb-2">
                        <label className="text-sm font-bold text-gray-700">{label}</label>
                        <button onClick={() => setIsOpen(!isOpen)} className="text-gray-500 hover:text-blue-600 text-xs flex items-center gap-1">
                             <Settings size={14}/> {isOpen ? 'ปิดตัวปรับแต่ง' : 'ปรับตำแหน่ง/ขนาด'}
                        </button>
                    </div>
                    <input type="file" accept="image/*" onChange={(e) => onUpload(e, imageKey)} className="block w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer mb-2" />
                    {isOpen && (
                        <div className="bg-gray-50 p-3 rounded text-xs space-y-3 animate-fade-in">
                            <div><div className="flex justify-between mb-1 text-gray-500"><span>ขนาด (Zoom)</span><span>{imageData.scale}x</span></div><input type="range" min="1" max="3" step="0.1" value={imageData.scale} onChange={(e) => onUpdateSetting(imageKey, 'scale', parseFloat(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer" /></div>
                            <div><div className="flex justify-between mb-1 text-gray-500"><span>ซ้าย-ขวา (X)</span><span>{imageData.x}%</span></div><input type="range" min="0" max="100" value={imageData.x} onChange={(e) => onUpdateSetting(imageKey, 'x', parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer" /></div>
                            <div><div className="flex justify-between mb-1 text-gray-500"><span>บน-ล่าง (Y)</span><span>{imageData.y}%</span></div><input type="range" min="0" max="100" value={imageData.y} onChange={(e) => onUpdateSetting(imageKey, 'y', parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer" /></div>
                            <button onClick={() => { onUpdateSetting(imageKey, 'scale', 1); onUpdateSetting(imageKey, 'x', 50); onUpdateSetting(imageKey, 'y', 50); }} className="text-red-500 hover:underline w-full text-center mt-2">รีเซ็ตค่าเดิม</button>
                        </div>
                    )}
                </div>
            );
        };

        const BrochureBuilder = () => {
            const [data, setData] = useState({
                headline: "ขายต่ำกว่าราคาประเมิน!",
                subHeadline: "กู้ได้เกิน มีเงินเหลือแต่งบ้านกว่า 3 แสนบาท",
                price: "2.79",
                evalPrice: "3.1",
                location: "ซอยข้างวัด... (ระบุพิกัด)",
                phone: "08x-xxx-xxxx",
                lineId: "@yourlineid",
                images: {
                    main: { url: "", x: 50, y: 50, scale: 1 },
                    sub1: { url: "", x: 50, y: 50, scale: 1 },
                    sub2: { url: "", x: 50, y: 50, scale: 1 },
                    sub3: { url: "", x: 50, y: 50, scale: 1 },
                    qr: { url: "", x: 50, y: 50, scale: 1 },
                },
                features: [
                    "บ้านสร้างใหม่ พร้อมอยู่ทันที",
                    "พื้นที่ใช้สอย 155 ตร.ม. (22.5 ตร.ว.)",
                    "2 ห้องนอน (Master + เล็ก)",
                    "2 ห้องน้ำ (บน-ล่าง)",
                    "จอดรถสะดวก สบาย",
                    "ต่อเติมครัว + หลังคาโรงรถแล้ว"
                ],
                promotions: [
                    "ฟรี! ค่าโอนกรรมสิทธิ์",
                    "ฟรี! แอร์ HomePro 2 เครื่อง",
                    "ฟรี! ปั๊มน้ำ + แทงค์น้ำ Dos",
                    "ฟรี! กั้นห้องเพิ่มชั้นล่าง"
                ]
            });

            const handlePrint = () => window.print();
            const handleInputChange = (e) => setData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleFeatureChange = (index, value) => { const newFeatures = [...data.features]; newFeatures[index] = value; setData(prev => ({ ...prev, features: newFeatures })); };
            const handlePromotionChange = (index, value) => { const newPromotions = [...data.promotions]; newPromotions[index] = value; setData(prev => ({ ...prev, promotions: newPromotions })); };
            const handleImageUpload = (e, key) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setData(prev => ({ ...prev, images: { ...prev.images, [key]: { ...prev.images[key], url: reader.result } } }));
                    reader.readAsDataURL(file);
                }
            };
            const handleImageSetting = (key, setting, value) => setData(prev => ({ ...prev, images: { ...prev.images, [key]: { ...prev.images[key], [setting]: value } } }));

            return (
                <div className="flex flex-col lg:flex-row min-h-screen bg-gray-100 font-sans">
                    <div className="w-full lg:w-[400px] xl:w-[450px] shrink-0 p-4 lg:p-6 bg-white shadow-xl z-20 h-auto lg:h-screen lg:overflow-y-auto border-b lg:border-b-0 lg:border-r border-gray-200 no-print">
                        <div className="mb-6 flex justify-between items-center sticky top-0 bg-white py-2 z-10 border-b lg:border-none">
                            <h2 className="text-xl lg:text-2xl font-bold text-gray-800">🛠️ แก้ไขโบรชัวร์</h2>
                            <button onClick={handlePrint} className="flex items-center gap-2 bg-blue-600 text-white px-3 py-1.5 lg:px-4 lg:py-2 rounded-lg hover:bg-blue-700 transition shadow-lg text-sm lg:text-base whitespace-nowrap">
                                <Printer size={18} /> <span className="hidden sm:inline">พิมพ์ / PDF</span><span className="sm:hidden">Print</span>
                            </button>
                        </div>

                        <div className="space-y-6 pb-8 lg:pb-0">
                            {/* Editor Form - Same as before */}
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Star size={18}/> หัวข้อหลัก</h3>
                                <div className="space-y-3">
                                    <div><label className="block text-sm text-gray-600 mb-1">พาดหัวใหญ่</label><input type="text" name="headline" value={data.headline} onChange={handleInputChange} className="w-full border p-2 rounded outline-none" /></div>
                                    <div><label className="block text-sm text-gray-600 mb-1">คำโปรยรอง</label><input type="text" name="subHeadline" value={data.subHeadline} onChange={handleInputChange} className="w-full border p-2 rounded outline-none" /></div>
                                </div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Gift size={18}/> ราคา</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="block text-sm text-gray-600 mb-1">ราคาขาย</label><input type="text" name="price" value={data.price} onChange={handleInputChange} className="w-full border p-2 rounded font-bold text-red-600" /></div>
                                    <div><label className="block text-sm text-gray-600 mb-1">ราคาประเมิน</label><input type="text" name="evalPrice" value={data.evalPrice} onChange={handleInputChange} className="w-full border p-2 rounded" /></div>
                                </div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><ImageIcon size={18}/> รูปภาพ</h3>
                                <div className="space-y-3">
                                    <ImageControl label="รูปหลัก (Main)" imageKey="main" imageData={data.images.main} onUpload={handleImageUpload} onUpdateSetting={handleImageSetting} />
                                    <div className="grid grid-cols-1 gap-3">
                                        <ImageControl label="รูปย่อย 1" imageKey="sub1" imageData={data.images.sub1} onUpload={handleImageUpload} onUpdateSetting={handleImageSetting} />
                                        <ImageControl label="รูปย่อย 2" imageKey="sub2" imageData={data.images.sub2} onUpload={handleImageUpload} onUpdateSetting={handleImageSetting} />
                                        <ImageControl label="รูปย่อย 3" imageKey="sub3" imageData={data.images.sub3} onUpload={handleImageUpload} onUpdateSetting={handleImageSetting} />
                                    </div>
                                </div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><CheckCircle size={18}/> รายละเอียดบ้าน</h3>
                                {data.features.map((feat, idx) => (
                                    <input key={idx} type="text" value={feat} onChange={(e) => handleFeatureChange(idx, e.target.value)} className="w-full border p-2 rounded mb-2 text-sm" />
                                ))}
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Gift size={18}/> โปรโมชั่น</h3>
                                {data.promotions.map((promo, idx) => (
                                    <input key={idx} type="text" value={promo} onChange={(e) => handlePromotionChange(idx, e.target.value)} className="w-full border p-2 rounded mb-2 text-sm" />
                                ))}
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Phone size={18}/> ติดต่อ & ทำเล</h3>
                                <div className="space-y-3">
                                    <input type="text" name="phone" value={data.phone} onChange={handleInputChange} placeholder="เบอร์โทร" className="w-full border p-2 rounded" />
                                    <input type="text" name="lineId" value={data.lineId} onChange={handleInputChange} placeholder="Line ID" className="w-full border p-2 rounded" />
                                    <textarea name="location" value={data.location} onChange={handleInputChange} placeholder="พิกัด/ทำเล" className="w-full border p-2 rounded h-20" />
                                    <div className="pt-2 border-t border-gray-200 mt-2">
                                        <label className="block text-sm text-gray-600 mb-2 font-bold">QR Code (Line)</label>
                                        <ImageControl label="อัปโหลด QR Code" imageKey="qr" imageData={data.images.qr} onUpload={handleImageUpload} onUpdateSetting={handleImageSetting} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --- PREVIEW PANEL --- */}
                    <div className="flex-1 bg-gray-500 overflow-hidden relative flex justify-center items-start print:p-0 print:w-full print:bg-white min-h-[500px] lg:min-h-screen print:block print:min-h-0">
                        <div className="w-full h-full overflow-auto flex justify-center p-4 lg:p-8 print:p-0 print:m-0 print:block print:overflow-hidden print:w-[100vw] print:h-[100vh]">
                            <div className="transform-origin-top transition-transform duration-300 scale-[0.29] sm:scale-[0.45] md:scale-[0.5] lg:scale-[0.6] xl:scale-[0.75] print:scale-100 print:transform-none print:m-0 print:block">
                                <div className="bg-white shadow-2xl relative flex flex-col print:shadow-none mx-auto print:m-0 overflow-hidden print:w-full print:h-[100vh]" style={{ width: '297mm', height: '420mm', boxSizing: 'border-box' }}>
                                    
                                    {/* Header: ลด padding ล่าง (pb-24 จากเดิม pb-32) */}
                                    <div className="bg-blue-900 text-white relative pb-24 pt-10 px-10" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 85%, 0 100%)' }}>
                                        <div className="absolute top-4 right-4 opacity-10"><Home size={160} /></div>
                                        <div className="text-center relative z-10">
                                            <div className="inline-block bg-yellow-400 text-blue-900 font-bold px-6 py-2 rounded-full text-xl mb-3">
                                                <Star className="inline mr-2 mb-1" size={20}/> โอกาสทอง นักลงทุน/คนหาบ้าน
                                            </div>
                                            <h1 className="text-6xl font-extrabold mb-3 leading-tight">{data.headline}</h1>
                                            <p className="text-3xl font-light text-yellow-300">{data.subHeadline}</p>
                                        </div>
                                    </div>

                                    {/* Main Image: ลดความสูงลงเหลือ 380px จากเดิม 450px */}
                                    <div className="px-10 -mt-12 relative z-20 h-[380px]">
                                        <div className="w-full h-full bg-gray-200 rounded-2xl overflow-hidden shadow-2xl border-4 border-white relative">
                                            <img 
                                                src={data.images.main.url || "https://placehold.co/800x600?text=Select+Image"} 
                                                alt="Main House" 
                                                className="w-full h-full object-cover transition-all duration-200"
                                                style={{ objectPosition: `${data.images.main.x}% ${data.images.main.y}%`, transform: `scale(${data.images.main.scale})`, transformOrigin: 'center center' }}
                                                onError={(e) => e.target.src = "https://placehold.co/800x600?text=No+Image"} 
                                            />
                                            <div className="absolute bottom-6 right-6 bg-red-600 text-white px-8 py-5 rounded-tl-[2.5rem] rounded-br-xl shadow-xl transform -rotate-2 border-4 border-white z-10">
                                                <p className="text-xl opacity-90">ราคาประเมิน {data.evalPrice} ลบ.</p>
                                                <p className="text-5xl font-extrabold">ขาย {data.price} ลบ.*</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Content Body: ลดช่องว่าง gap-10 เป็น gap-6 และลด padding-y */}
                                    <div className="px-12 py-6 flex-grow flex flex-col gap-6">
                                        <div className="flex gap-8 h-full">
                                            <div className="w-1/2 pt-2">
                                                <h2 className="text-3xl font-bold text-blue-900 mb-6 border-b-8 border-yellow-400 inline-block pb-2">รายละเอียดบ้าน</h2>
                                                {/* ลดระยะห่างบรรทัด space-y-5 เป็น space-y-3 */}
                                                <ul className="space-y-3">
                                                    {data.features.map((feat, i) => (
                                                        <li key={i} className="flex items-center text-xl text-gray-700 font-medium">
                                                            <CheckCircle className="text-green-500 mr-4 flex-shrink-0" size={28} />
                                                            {feat}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="w-1/2 grid grid-cols-2 gap-4">
                                                {/* ลดความสูงรูปย่อยจาก h-48 เป็น h-40 */}
                                                {['sub1', 'sub2', 'sub3'].map((key, i) => (
                                                    <div key={key} className={`rounded-xl overflow-hidden shadow-md border-2 border-gray-100 h-40 ${i === 2 ? 'col-span-2' : ''}`}>
                                                        <img 
                                                            src={data.images[key].url || "https://placehold.co/400x300?text=No+Image"} 
                                                            className="w-full h-full object-cover transition-all duration-200"
                                                            style={{ objectPosition: `${data.images[key].x}% ${data.images[key].y}%`, transform: `scale(${data.images[key].scale})`, transformOrigin: 'center center' }}
                                                            alt={`sub-${i}`} 
                                                            onError={(e) => e.target.src = "https://placehold.co/400x300?text=No+Image"} 
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* ลด padding กล่องโปรโมชั่น */}
                                        <div className="bg-blue-50 p-6 rounded-3xl border-l-[8px] border-blue-600 shadow-sm flex items-start mt-2">
                                            <div className="mr-6 pt-2"><Gift size={48} className="text-red-500" /></div>
                                            <div className="flex-1">
                                                <h3 className="text-2xl font-bold text-red-600 mb-3">🔥 โปรฯ แรงส่งท้ายปี! (จองภายในปีนี้)</h3>
                                                <div className="grid grid-cols-2 gap-x-8 gap-y-2">
                                                    {data.promotions.map((promo, i) => (
                                                        <p key={i} className="text-xl text-gray-800 font-semibold flex items-center">✅ {promo}</p>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Footer: ลด padding และขนาดตัวอักษรเล็กน้อย */}
                                    <div className="bg-gray-900 text-white p-8 flex items-center justify-between mt-auto">
                                        <div>
                                            <p className="text-2xl text-yellow-400 mb-2 font-bold">ปรึกษาสินเชื่อฟรี! ดันทุกเคส</p>
                                            <div className="text-6xl font-extrabold mb-3 tracking-wider flex items-center gap-4">
                                                <Phone size={48} className="text-green-400" /> {data.phone}
                                            </div>
                                            <div className="text-xl flex items-center gap-4 opacity-90">
                                                <span className="bg-green-600 px-4 py-1 rounded-lg font-bold">LINE: {data.lineId}</span>
                                                <span>| <MapPin className="inline mb-1 text-red-500"/> {data.location}</span>
                                            </div>
                                        </div>
                                        {/* ลดขนาด QR Code ลงจาก 48 เป็น 36 */}
                                        <div className="bg-white p-2 rounded-xl w-36 h-36 flex items-center justify-center shadow-lg overflow-hidden relative">
                                            {data.images.qr.url ? (
                                                <img 
                                                    src={data.images.qr.url} 
                                                    className="w-full h-full object-cover transition-all duration-200"
                                                    style={{ objectPosition: `${data.images.qr.x}% ${data.images.qr.y}%`, transform: `scale(${data.images.qr.scale})`, transformOrigin: 'center center' }}
                                                    alt="QR Code" 
                                                />
                                            ) : (
                                                <div className="text-center text-gray-800">
                                                    <ImageIcon size={32} className="mx-auto mb-1 opacity-50"/>
                                                    <span className="font-bold text-xs block">แปะ QR Code</span>
                                                    <span className="text-[10px] text-gray-500">ที่นี่</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BrochureBuilder />);
    </script>
</body>
</html>
